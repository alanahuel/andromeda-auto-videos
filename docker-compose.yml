services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    # Hetzner box: 2 vCPU, 7.8 GiB. Cap memory so a runaway ffmpeg cannot
    # OOM the host.
    mem_limit: 6g
    mem_reservation: 1g
    # Render workdirs live under /tmp inside the container. tmpfs is off
    # by design — renders can be GBs and OOM-trash the host.
